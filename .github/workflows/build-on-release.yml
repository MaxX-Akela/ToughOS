name: Build and Release Companion RPi4 Image

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zip

    - name: Customize Image via QEMU (Manual Bootstrap)
      uses: pguyot/arm-runner-action@v2
      with:
        base_image: https://downloads.raspberrypi.com/raspios_lite_armhf/images/raspios_lite_armhf-2023-05-03/2023-05-03-raspios-bullseye-armhf-lite.img.xz
        image_additional_mb: 2500
        copy_repository_path: /home/pi/companion
        commands: |
          systemctl disable userconfig
          systemctl enable ssh
          systemctl start ssh

          if ! id -u pi >/dev/null 2>&1; then
              useradd -m -s /bin/bash pi
              echo "pi:raspberry" | chpasswd
              usermod -aG sudo,video,plugdev pi
              echo "pi ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/010_pi-nopasswd
          fi

          apt-get update
          apt-get install -y \
            python3-pip \
            python3-dev \
            python3-setuptools \
            python-is-python3 \
            nodejs \
            git \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-tools \
            v4l-utils \
            screen \
            iw \
            i2c-tools

          # Выбрали правильную полную строчку и убрали маркеры конфликта Git
          pip3 install tornado pyserial pymavlink MAVProxy netifaces pywifi brping requests flask numpy
          
          echo "" >> /etc/dhcpcd.conf
          echo "interface eth0" >> /etc/dhcpcd.conf
          echo "static ip_address=192.168.2.2/24" >> /etc/dhcpcd.conf

          cp /home/pi/companion/params/wpa_supplicant.conf.default /etc/wpa_supplicant/wpa_supplicant.conf

          chmod +x /etc/rc.local
          if ! grep -q "companion.rc" /etc/rc.local; then
              sed -i "s|^exit 0|. /home/pi/companion/.companion.rc\n\nexit 0|" /etc/rc.local
          fi

          echo "enable_uart=1" >> /boot/config.txt
          echo "camera_auto_detect=1" >> /boot/config.txt

          chown -R pi:pi /home/pi/companion
          chmod +x /home/pi/companion/scripts/*.sh
          chmod +x /home/pi/companion/tools/*.py
          chmod +x /home/pi/companion/tools/mavlink2rest

    - name: Compress OS Image
      run: |
        TAG_NAME="${{ github.event.release.tag_name }}"
        ZIP_NAME="companion-${TAG_NAME:-manual}.zip"
        cp /home/runner/work/_temp/arm-runner/arm-runner.img ./companion-rpi4.img
        zip $ZIP_NAME companion-rpi4.img
        echo "ZIP_FILE_NAME=$ZIP_NAME" >> $GITHUB_ENV

    - name: Upload Image to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.ZIP_FILE_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}